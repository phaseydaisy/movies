<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email • Movies</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="bg-netflix-black text-white min-h-screen app-theme">
  <main class="app-shell auth-page-wrap">
    <section class="auth-card">
      <h1 class="auth-title">Verify your email</h1>
      <p class="auth-subtitle">Enter the 6-digit code sent to your email.</p>
      <p id="verificationHint" class="auth-help">Check your email for the verification code.</p>

      <form id="verifyForm" class="auth-form" autocomplete="on">
        <label class="auth-field">Email
          <input id="email" type="email" class="auth-input" autocomplete="email" required />
        </label>
        <label class="auth-field">Verification code
          <input id="verificationCode" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" class="auth-input auth-input-code" required />
        </label>

        <p id="authMessage" class="hidden auth-message"></p>
        <button type="submit" class="auth-submit">Verify email</button>
      </form>

      <div class="auth-links auth-links-inline">
        <button id="sendCode" class="auth-secondary" type="button">Send code</button>
        <a href="../signin/">Back to sign in</a>
      </div>
    </section>
  </main>

  <script type="module" src="../auth/client.js"></script>
</body>
</html>
