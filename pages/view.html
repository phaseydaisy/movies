<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Details • CineNest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%236d8bff'/%3E%3Cstop offset='100%25' stop-color='%23ff3d5e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%23090a0f'/%3E%3Cpath d='M16 44V20h6l8 12 8-12h6v24h-6V30l-8 12-8-12v14z' fill='url(%23g)'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="bg-netflix-black text-white min-h-screen app-theme">
  <header class="px-4 lg:px-16 py-4 border-b border-white/10 flex items-center justify-between">
    <div class="app-shell w-full flex items-center justify-between">
      <h1 class="text-netflix-red text-2xl font-bold cursor-pointer brand-mark" onclick="location.href='/'">CineNest</h1>
      <button onclick="history.back()" class="px-4 py-2 bg-zinc-800 rounded">Back</button>
    </div>
  </header>

  <main class="app-shell px-4 lg:px-8">
    <section class="relative h-[52vh] mt-4 overflow-hidden hero-panel">
      <img id="backdrop" class="w-full h-full object-cover" alt="Backdrop" />
      <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
      <div class="absolute bottom-6 left-4 lg:left-16 right-4">
        <h2 id="title" class="text-3xl lg:text-5xl font-bold"></h2>
        <p id="meta" class="text-gray-200 mt-2"></p>
      </div>
    </section>

    <section class="py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 space-y-6">
        <div class="content-block">
          <h3 class="text-xl font-semibold mb-2">Synopsis</h3>
          <p id="overview" class="text-gray-300"></p>
        </div>
        <div class="content-block">
          <h3 class="text-xl font-semibold mb-2">Genres</h3>
          <div id="genres" class="flex flex-wrap gap-2"></div>
        </div>
        <div class="content-block">
          <h3 class="text-xl font-semibold mb-2">Similar Titles</h3>
          <div id="similar" class="card-row"></div>
        </div>
      </div>
      <aside class="watch-side-panel">
        <img id="poster" class="w-full rounded-xl border border-zinc-700" alt="Poster" />
        <button id="watchBtn" class="w-full mt-4 bg-netflix-red py-3 rounded font-semibold">Watch</button>
      </aside>
    </section>
  </main>

  <script type="module" src="../src/view.js"></script>
</body>
</html>
