<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search • CineNest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "netflix-red": "#E50914",
            "netflix-dark": "#141414",
            "netflix-black": "#000000"
          }
        }
      }
    };
  </script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%236d8bff'/%3E%3Cstop offset='100%25' stop-color='%23ff3d5e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%23090a0f'/%3E%3Cpath d='M16 44V20h6l8 12 8-12h6v24h-6V30l-8 12-8-12v14z' fill='url(%23g)'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="bg-netflix-black text-white min-h-screen app-theme">
  <header class="fixed top-0 inset-x-0 z-50 bg-black/60 backdrop-blur border-b border-white/10">
    <div class="app-shell px-4 lg:px-8 py-4 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="h-9 w-9 rounded-xl bg-gradient-to-br from-indigo-400 to-rose-500 grid place-items-center font-black text-black">C</div>
        <h1 class="text-netflix-red text-2xl font-bold cursor-pointer brand-mark" onclick="location.href='../index.html'">CineNest</h1>
      </div>
      <button id="backHome" class="utility-pill"><i class="fa-solid fa-arrow-left"></i> Back Home</button>
    </div>
  </header>

  <main class="pt-24 app-shell px-4 lg:px-8 pb-8 relative">
    <div class="absolute inset-0 pointer-events-none opacity-35" style="background: radial-gradient(circle at 20% 10%, rgba(128, 96, 255, 0.22), transparent 40%), radial-gradient(circle at 80% 15%, rgba(255, 68, 106, 0.2), transparent 38%);"></div>

    <section class="relative z-10 bg-zinc-900/85 border border-zinc-700 rounded-xl h-[86vh] overflow-hidden flex flex-col shadow-2xl search-shell">
      <div id="searchFloatingQuery" class="search-floating-query">Results for "trending"</div>

      <div class="p-4 border-b border-zinc-700 space-y-3">
        <div class="flex items-center justify-between gap-4">
          <div>
            <h2 class="text-2xl font-bold">Search Results</h2>
            <p id="searchQueryDisplay" class="text-sm text-gray-300 mt-1">Query: trending</p>
          </div>
          <button id="searchCloseX" type="button" class="h-10 w-10 rounded-full bg-zinc-800 grid place-items-center" aria-label="Go home"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="flex flex-col md:flex-row md:items-center gap-3">
          <div class="relative flex-1">
            <input id="searchInput" class="w-full bg-zinc-900 border border-zinc-700 rounded px-4 py-2 text-sm" placeholder="Search movie/series/person" />
            <button id="searchBtn" class="absolute right-2 top-1/2 -translate-y-1/2 h-8 w-8 rounded hover:bg-zinc-800 text-gray-400" aria-label="Search">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
          <div class="flex gap-2 text-sm">
            <button class="filter-btn active" data-filter="multi">All</button>
            <button class="filter-btn" data-filter="movie">Movies</button>
            <button class="filter-btn" data-filter="tv">TV Shows</button>
            <button class="filter-btn" data-filter="person">People</button>
          </div>
        </div>
      </div>

      <div id="searchResults" class="flex-1 overflow-auto p-4 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>

      <div class="p-4 border-t border-zinc-700 flex justify-between items-center gap-2">
        <p id="resultCount" class="text-xs text-gray-400">Loading...</p>
        <div class="flex gap-2">
          <button id="prevPage" class="px-4 py-2 bg-zinc-800 rounded">Prev</button>
          <button id="nextPage" class="px-4 py-2 bg-zinc-800 rounded">Next</button>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="hidden fixed bottom-4 right-4 bg-zinc-800 border border-zinc-600 px-4 py-3 rounded-lg text-sm"></div>

  <script type="module" src="../src/search.js"></script>
</body>
</html>
