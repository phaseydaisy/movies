<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch • CineNest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%236d8bff'/%3E%3Cstop offset='100%25' stop-color='%23ff3d5e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%23090a0f'/%3E%3Cpath d='M16 44V20h6l8 12 8-12h6v24h-6V30l-8 12-8-12v14z' fill='url(%23g)'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="bg-netflix-black text-white min-h-screen app-theme">
  <header class="watch-topbar px-4 lg:px-8 py-4">
    <div class="app-shell w-full flex items-center justify-between gap-3">
      <div class="flex items-center gap-3 min-w-0">
        <div class="h-9 w-9 rounded-xl bg-gradient-to-br from-indigo-400 to-rose-500 grid place-items-center font-black text-black">C</div>
        <h1 class="text-netflix-red text-2xl font-bold cursor-pointer brand-mark" onclick="location.href='../index.html'">CineNest</h1>
        <span class="watch-live-pill"><i class="fa-solid fa-circle"></i> Now Streaming</span>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="history.back()" class="watch-nav-btn"><i class="fa-solid fa-arrow-left"></i>Back</button>
        <button onclick="location.href='../index.html'" class="watch-nav-btn"><i class="fa-solid fa-house"></i>Home</button>
      </div>
    </div>
  </header>

  <main class="app-shell watch-page px-4 lg:px-8 py-6">
    <section class="watch-layout">
      <section class="watch-main-panel">
        <div class="watch-main-head">
          <div class="min-w-0">
            <p class="watch-kicker">Playback</p>
            <h2 id="title" class="watch-content-title">Loading...</h2>
            <p id="meta" class="watch-content-meta"></p>
          </div>
          <button id="detailsBtn" class="watch-details-btn"><i class="fa-solid fa-circle-info"></i>Details</button>
        </div>

        <div id="playerWrap" class="aspect-video bg-black rounded-xl overflow-hidden border border-zinc-700 relative">
          <div id="playerContent" class="w-full h-full flex items-center justify-center text-gray-300">Loading player...</div>
          <button id="playerNextOverlay" class="player-next-overlay hidden" type="button">
            <i class="fa-solid fa-forward-step"></i>
            <span>Next</span>
          </button>
        </div>

        <div class="watch-controls-block">
          <div class="flex items-start justify-between gap-4 mb-3 flex-wrap">
            <h3 class="text-lg font-semibold">Server & Episode Controls</h3>
            <p id="serverHint" class="text-xs text-gray-400">Switch if the current source is unavailable.</p>
          </div>

          <div id="serverList" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>

          <div id="episodeControls" class="hidden mt-4 rounded-lg border border-zinc-700 bg-zinc-900/70 p-3">
            <p class="text-sm font-semibold mb-2">Episode Options</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
              <label class="text-xs text-gray-400">Season
                <select id="seasonSelect" class="mt-1 w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm"></select>
              </label>
              <label class="text-xs text-gray-400">Episode
                <select id="episodeSelect" class="mt-1 w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm"></select>
              </label>
            </div>
            <div class="mt-3 flex justify-end">
              <button id="nextBtn" class="px-4 py-2 rounded border border-netflix-red bg-netflix-red text-white text-sm font-semibold">
                <i class="fa-solid fa-forward-step mr-1"></i>Next
              </button>
            </div>
            <p id="episodeHint" class="text-xs text-gray-400 mt-2">Select a season and episode to reload the server source.</p>
          </div>
        </div>
      </section>

      <aside class="watch-side-card">
        <img id="poster" class="watch-poster" alt="Poster" />
        <div class="space-y-3">
          <h3 class="text-lg font-semibold leading-tight">About This Title</h3>
          <p id="overview" class="watch-overview">Loading...</p>
        </div>
      </aside>
    </section>

    <section class="watch-mobile-info content-block mt-5">
      <h2 id="titleMobile" class="text-2xl font-bold">Loading...</h2>
      <p id="metaMobile" class="text-sm text-gray-400 mt-1"></p>
      <p id="overviewMobile" class="text-gray-300 mt-3 leading-relaxed"></p>
    </section>
  </main>

  <script>
    const syncMobileInfo = () => {
      const title = document.getElementById("title");
      const meta = document.getElementById("meta");
      const overview = document.getElementById("overview");
      const titleMobile = document.getElementById("titleMobile");
      const metaMobile = document.getElementById("metaMobile");
      const overviewMobile = document.getElementById("overviewMobile");
      if (!title || !meta || !overview || !titleMobile || !metaMobile || !overviewMobile) return;
      const observer = new MutationObserver(() => {
        titleMobile.textContent = title.textContent;
        metaMobile.textContent = meta.textContent;
        overviewMobile.textContent = overview.textContent;
      });
      observer.observe(title, { childList: true, subtree: true });
      observer.observe(meta, { childList: true, subtree: true });
      observer.observe(overview, { childList: true, subtree: true });
    };
    syncMobileInfo();
  </script>

  <script type="module" src="../src/watch.js"></script>
</body>
</html>
