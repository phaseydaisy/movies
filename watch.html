<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch • CineNest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%236d8bff'/%3E%3Cstop offset='100%25' stop-color='%23ff3d5e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%23090a0f'/%3E%3Cpath d='M16 44V20h6l8 12 8-12h6v24h-6V30l-8 12-8-12v14z' fill='url(%23g)'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-netflix-black text-white min-h-screen app-theme">
  <header class="px-4 lg:px-16 py-4 border-b border-white/10 flex items-center justify-between">
    <div class="app-shell w-full flex items-center justify-between">
      <h1 class="text-netflix-red text-2xl font-bold cursor-pointer brand-mark" onclick="location.href='index.html'">CineNest</h1>
      <button onclick="history.back()" class="px-4 py-2 bg-zinc-800 rounded">Back</button>
    </div>
  </header>

  <main class="app-shell px-4 lg:px-8 py-8">
    <section class="watch-hero mb-6">
      <p class="watch-kicker">Now Watching</p>
      <h2 class="watch-heading">Playback Center</h2>
      <p class="watch-subtext">Switch servers, jump between episodes, and keep details in one place.</p>
    </section>

    <section class="space-y-5">
      <div id="playerWrap" class="aspect-video bg-black rounded-xl overflow-hidden border border-zinc-700 relative">
        <div id="playerContent" class="w-full h-full flex items-center justify-center text-gray-300">Loading player...</div>
        <button id="playerNextOverlay" class="player-next-overlay hidden" type="button">
          <i class="fa-solid fa-forward-step"></i>
          <span>Next</span>
        </button>
      </div>
      <div class="mt-4 rounded-xl border border-zinc-700 bg-zinc-900/60 p-4 content-block">
        <div class="flex items-center justify-between gap-3 mb-3">
          <h3 class="text-lg font-semibold">Choose Server</h3>
          <p id="serverHint" class="text-xs text-gray-400">Switch if the current source is unavailable.</p>
        </div>
        <div id="serverList" class="grid grid-cols-2 md:grid-cols-3 gap-2"></div>

        <div id="episodeControls" class="hidden mt-4 rounded-lg border border-zinc-700 bg-zinc-900/70 p-3">
          <p class="text-sm font-semibold mb-2">Episode Options</p>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
            <label class="text-xs text-gray-400">Season
              <select id="seasonSelect" class="mt-1 w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm"></select>
            </label>
            <label class="text-xs text-gray-400">Episode
              <select id="episodeSelect" class="mt-1 w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm"></select>
            </label>
          </div>
          <div class="mt-3 flex justify-end">
            <button id="nextBtn" class="px-4 py-2 rounded border border-netflix-red bg-netflix-red text-white text-sm font-semibold">
              <i class="fa-solid fa-forward-step mr-1"></i>Next
            </button>
          </div>
          <p id="episodeHint" class="text-xs text-gray-400 mt-2">Select a season and episode to reload the server source.</p>
        </div>
      </div>

      <section class="content-block">
        <div class="flex flex-col md:flex-row gap-4">
          <img id="poster" class="w-full md:w-44 md:h-64 object-cover rounded-xl border border-zinc-700" alt="Poster" />
          <div class="flex-1 min-w-0">
            <h2 id="title" class="text-2xl md:text-3xl font-bold">Loading...</h2>
            <p id="meta" class="text-sm text-gray-400 mt-1"></p>
            <p id="overview" class="text-gray-300 mt-3 leading-relaxed"></p>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="src/watch.js"></script>
</body>
</html>
