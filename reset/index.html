<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password • Movies</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="bg-netflix-black text-white min-h-screen app-theme">
  <main class="app-shell auth-page-wrap">
    <section class="auth-card">
      <h1 class="auth-title">Reset password</h1>
      <p class="auth-subtitle">Request a code, then set a new password.</p>

      <form id="resetPasswordForm" class="auth-form" autocomplete="on">
        <label class="auth-field">Email
          <input id="email" type="email" class="auth-input" autocomplete="email" required />
        </label>

        <div class="auth-inline-actions">
          <button id="sendResetCode" type="button" class="auth-submit auth-submit-secondary">Send reset code</button>
        </div>

        <label class="auth-field">Reset code
          <input id="resetCode" type="text" inputmode="numeric" maxlength="6" class="auth-input auth-input-code" required />
        </label>

        <label class="auth-field">New password
          <input id="newPassword" type="password" class="auth-input" autocomplete="new-password" minlength="6" required />
        </label>

        <p id="authMessage" class="hidden auth-message"></p>

        <button type="submit" class="auth-submit">Update password</button>
      </form>

      <div class="auth-links">
        <p>Remembered it? <a href="../signin/">Back to sign in</a></p>
        <p><a href="/">Back to home</a></p>
      </div>
    </section>
  </main>

  <script type="module" src="../auth/client.js"></script>
</body>
</html>
